<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feed</title>
<link rel="icon" type="image/png" href="https://images.squarespace-cdn.com/content/v1/65c69f2e6eb8ad565f5d45f1/33d63755-2f5b-4f4a-9615-8608b9c3b6ea/Untitled+design.png?format=1500w/45x45">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap');

  :root {
    --bg: #0D0505;
    --fg: #C7BFBB;
    --fg-dim: #A09994;
    --border: rgba(232,230,224,0.12);
    --border-hover: rgba(232,230,224,0.28);
    --accent: #e8e6e0;
    --surface: #120A0A;
    --col-width: calc(50vw - 1px);
    --topbar-h: 58px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--fg);
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 18px;
    transition: background 0.2s, color 0.2s;
    -webkit-font-smoothing: antialiased;
    animation: fadein 0.8s ease-out;
  }

  /* ── TOPBAR ── */
  #topbar {
    height: var(--topbar-h);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    border-bottom: 1px solid var(--border);
    position: relative;
    z-index: 10;
    flex-shrink: 0;
  }
  #logo {
    width: 40px; height: 40px;
    overflow: hidden;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: var(--fg-dim);
  }
  #logo img { width: 100%; height: 100%; object-fit: cover; }
  #brand-url {
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--fg-dim);
    font-style: italic;
  }
  #site-title {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    font-weight: 400;
    letter-spacing: 0.02em;
    color: var(--fg);
  }
  .topbar-sep { color: var(--fg-dim); font-size: 11px; }

  /* ── BODY ── */
  #body {
    display: flex;
    height: calc(100vh - var(--topbar-h));
    overflow: hidden;
  }

  .column {
    flex: 1;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden;
    position: relative;
  }
  .column:last-child { border-right: none; }

  .col-scroll {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 20px 16px 12px;
    scrollbar-width: thin;
    scrollbar-color: var(--border-hover) transparent;
  }
  .col-scroll::-webkit-scrollbar { width: 4px; }
  .col-scroll::-webkit-scrollbar-track { background: transparent; }
  .col-scroll::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 2px; }

  /* ── MASONRY ── */
  .masonry {
    columns: 3;
    column-gap: 10px;
  }
  .post-card {
    break-inside: avoid;
    margin-bottom: 10px;
    border: 0px solid var(--border);
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s ease;
    background: var(--bg);
  }
  .post-card:hover { border-color: var(--border-hover); }

  /* image posts */
  .post-card.type-image img {
    display: block;
    width: 100%;
    height: auto;
    object-fit: contain;
  }

  /* text posts */
  .post-card.type-text {
    padding: 14px 12px 4px;
  }
  .post-card.type-text .post-title {
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    line-height: 1.4;
    color: var(--fg);
    margin-bottom: 8px;
  }
  .post-card.type-text .post-body {
    font-size: 15px;
    line-height: 1.6;
    color: var(--fg-dim);
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 9;
    -webkit-box-orient: vertical;
  }

.post-card.type-text .post-body i,
.post-card.type-text .post-body em {
  font-style: italic;
}

  /* mixed/video/etc */
  .post-card.type-other {
    padding: 14px 12px 4px;
  }
  .post-card.type-other .post-body {
    font-size: 13px;
    line-height: 1.6;
    color: var(--fg-dim);
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 9;
    -webkit-box-orient: vertical;
  }

  .post-date {
    display: block;
    text-align: right;
    font-size: 11px;
    font-family: 'Bricolage Grotesque', sans-serif;
    letter-spacing: 0.06em;
    color: var(--fg-dim);
    font-variant-numeric: tabular-nums;
    padding: 6px 8px 8px;
  }

  /* ── PAGINATION ── */
  .col-pagination {
    height: 36px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 0 14px;
    gap: 8px;
    flex-shrink: 0;
  }
  .pg-btn {
    background: none;
    border: none;
    color: var(--fg-dim);
    cursor: pointer;
    font-family: 'EB Garamond', serif;
    font-size: 15px;
    padding: 2px 4px;
    transition: color 0.15s;
    line-height: 1;
  }
  .pg-btn:hover { color: var(--fg); }
  .pg-btn:disabled { opacity: 0.25; cursor: default; }
  .pg-current {
    font-size: 11px;
    color: var(--fg-dim);
    letter-spacing: 0.04em;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .pg-jump {
    cursor: pointer;
    border-bottom: 1px dotted var(--fg-dim);
    padding: 0 1px;
    transition: color 0.15s, border-color 0.15s;
  }
  .pg-jump:hover { color: var(--fg); border-color: var(--fg); }
  .pg-input {
    background: #1a1a1a;
    border: 1px solid var(--border-hover);
    color: var(--fg);
    font-family: 'EB Garamond', serif;
    font-size: 11px;
    width: 36px;
    text-align: center;
    padding: 1px 3px;
    outline: none;
    display: none;
  }
  .pg-input.visible { display: inline-block; }

  /* loading / error */
  .feed-state {
    padding: 40px 20px;
    text-align: center;
    color: var(--fg-dim);
    font-size: 11px;
    letter-spacing: 0.06em;
  }
  .feed-state.error { color: #c0392b; }

  /* ── LIGHTBOX ── */
  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(0,0,0,0.92);
    backdrop-filter: blur(6px);
    align-items: center;
    justify-content: center;
  }
  #lightbox.open { display: flex; }
  #lb-inner {
    position: relative;
    max-width: min(820px, 92vw);
    max-height: 95vh;
    overflow-y: auto;
    border: 1px solid var(--border-hover);
    border-radius: 10px;
    background: var(--surface);
    scrollbar-width: thin;
    scrollbar-color: var(--border-hover) transparent;
  }
  #lb-inner::-webkit-scrollbar { width: 4px; }
  #lb-inner::-webkit-scrollbar-thumb { background: var(--border-hover); }
  #lb-close {
    position: fixed;
    top: 18px; right: 22px;
    background: none;
    border: none;
    color: var(--fg-dim);
    font-size: 22px;
    cursor: pointer;
    line-height: 1;
    z-index: 101;
    transition: color 0.15s;
  }
  #lb-close:hover { color: var(--fg); }
  #lb-content {
    padding: 28px 28px 28px;
  }
  #lb-content img {
    display: block;
    width: 100%;
    height: auto;
    margin-bottom: 16px;
  }
  #lb-content .lb-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    line-height: 1.3;
    margin-bottom: 14px;
    color: var(--fg);
  }
  #lb-content .lb-body {
    font-size: 17px;
    line-height: 1.75;
    color: var(--fg-dim);
  }
  #lb-content .lb-body p { margin-bottom: 10px; }
  #lb-content .lb-body img { max-width: 100%; height: auto; }
  #lb-content .lb-body a { color: var(--fg); }
  #lb-meta {
    margin-top: 0px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
    font-size: 13px;
    padding: 6px 8px 8px;
    letter-spacing: 0.06em;
    color: var(--fg-dim);
    text-align: right;
  }

#lb-prev, #lb-next {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: var(--fg-dim);
  font-size: 28px;
  cursor: pointer;
  z-index: 101;
  padding: 16px;
  transition: color 0.15s;
  line-height: 1;
}
#lb-prev:hover, #lb-next:hover { color: var(--fg); }
#lb-prev:disabled, #lb-next:disabled { opacity: 0.15; cursor: default; }
#lb-prev { left: 12px; }
#lb-next { right: 12px; }

  /* ── MOBILE ── */
  @media (max-width: 700px) {
  html, body { overflow: auto; height: auto; }
  #body { flex-direction: column; height: auto; overflow: visible; }
  .column {
    border-right: none;
    border-bottom: 1px solid var(--border);
    height: auto;
    overflow: visible;
  }
  .col-scroll {
    overflow: visible;
    height: auto;
    padding: 16px 12px 8px;
  }
  .masonry { columns: 2; }
  .col-pagination { justify-content: flex-end; }
  #topbar { gap: 10px; }

    #lb-content {
    padding: 18px 18px 18px;
 }
    
  #lb-nav {
    display: flex;
    justify-content: space-between;
    width: 95vw;
    padding: 4px 0;
  }
      
  #lb-content .lb-body {
  font-size: 15px;
  }
    
  #lb-prev, #lb-next {
    position: static;
    transform: none;
    top: auto; left: auto; right: auto;
    font-size: 22px;
    padding: 20px 16px;
  }
  #lightbox {
    flex-direction: column;
    align-items: center;
  }
  #lb-inner {
    max-height: 70vh;
    width: 92vw;
  }
}
  

</style>
</head>

    logoText: '◎',        // fallback if no logoSrc

    // CORS proxy — required for cross-origin RSS fetch from GitHub Pages.

  };
</script>

<div id="topbar">
  <a id="logo" href="https://umbralclarity.com" target="_blank"></a>

<script>
// ── INIT TOPBAR ──────────────────────────────────────────────
(function() {
  const logoEl = document.getElementById('logo');
  if (CONFIG.logoSrc) {
    logoEl.innerHTML = `<img src="${CONFIG.logoSrc}" alt="logo">`;
  } else {
    logoEl.textContent = CONFIG.logoText;
  }
  document.getElementById('site-title').textContent = CONFIG.siteTitle;
  document.title = CONFIG.siteTitle;
})();

// ── RSS PARSER ───────────────────────────────────────────────
async function fetchFeed(url) {
  const proxyUrl = CONFIG.corsProxy
    ? CONFIG.corsProxy + encodeURIComponent(url)
    : url;
  const res = await fetch(proxyUrl);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const text = await res.text();
  const parser = new DOMParser();
  const doc = parser.parseFromString(text, 'application/xml');
  const parserError = doc.querySelector('parsererror');
  if (parserError) throw new Error('XML parse error');
  return doc;
}

function parseItems(xmlDoc) {
  return Array.from(xmlDoc.querySelectorAll('item')).map(item => {
    const title   = item.querySelector('title')?.textContent?.trim() || '';
    const pubDate = item.querySelector('pubDate')?.textContent?.trim() || '';
    const desc    = item.querySelector('description')?.textContent?.trim() || '';
    const link    = item.querySelector('link')?.textContent?.trim() || '';

    // Parse description HTML for images
    const tmp = document.createElement('div');
    tmp.innerHTML = desc;
    const imgs = Array.from(tmp.querySelectorAll('img'))
      .filter(i => !i.src.includes('avatar') && i.width !== 1);

    const date = pubDate ? formatDate(new Date(pubDate)) : '';

    return { title, pubDate, date, desc, link, imgs, rawHtml: desc };
  });
}

function formatDate(d) {
  if (isNaN(d)) return '';
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const yy = String(d.getFullYear()).slice(2);
  return `${dd}/${mm}/${yy}`;
}

// ── RENDER ───────────────────────────────────────────────────
function renderCards(items, masonryEl, onCardClick) {
  masonryEl.innerHTML = '';
  if (!items.length) {
    masonryEl.innerHTML = '<div class="feed-state">no posts</div>';
    return;
  }
  items.forEach((item, idx) => {
    const card = document.createElement('div');
    const hasImages = item.imgs.length > 0;
    const hasText = item.title || stripTags(item.rawHtml).trim().length > 10;

    // Tumblr RSS echoes body text into <title> for untitled posts.
    // Only treat as a real title if it doesn't appear verbatim at the start of the body.
    const bodyText = stripTags(item.rawHtml).trim();
    const realTitle = item.title && !bodyText.startsWith(item.title.slice(0, 40))
      ? item.title : '';

    if (hasImages && !realTitle && bodyText.length < 30) {
      card.className = 'post-card type-image';
      const img = document.createElement('img');
      img.src = item.imgs[0].src;
      img.alt = '';
      img.loading = 'lazy';
      card.appendChild(img);
    } else if (!hasImages) {
      card.className = 'post-card type-text';
      if (realTitle) {
        const t = document.createElement('div');
        t.className = 'post-title';
        t.textContent = realTitle;
        card.appendChild(t);
      }
      const body = document.createElement('div');
      body.className = 'post-body';
      const tmp2 = document.createElement('div');
tmp2.innerHTML = item.rawHtml;
tmp2.querySelectorAll('img, figure, iframe, video, a').forEach(el => el.remove());
body.innerHTML = tmp2.innerHTML;
      card.appendChild(body);
    } else {
      card.className = 'post-card type-other';
      const img = document.createElement('img');
      img.src = item.imgs[0].src;
      img.alt = '';
      img.loading = 'lazy';
      img.style.cssText = 'width:100%;height:auto;display:block;';
      card.appendChild(img);
      if (realTitle) {
        const t = document.createElement('div');
        t.className = 'post-title';
        t.style.cssText = 'padding: 10px 12px 0;';
        t.textContent = realTitle;
        card.appendChild(t);
      }
      if (bodyText.length > 30) {
  const body = document.createElement('div');
  body.className = 'post-body';
  body.style.cssText = 'padding: 6px 12px 0;';
  const tmp3 = document.createElement('div');
  tmp3.innerHTML = item.rawHtml;
  tmp3.querySelectorAll('img, figure, iframe, video, a').forEach(el => el.remove());
  body.innerHTML = tmp3.innerHTML;
  card.appendChild(body);
}
    }

    if (item.date) {
      const meta = document.createElement('div');
      meta.className = 'post-date';
      meta.textContent = item.date;
      card.appendChild(meta);
    }

    card.addEventListener('click', () => onCardClick(item, items, idx));
    masonryEl.appendChild(card);
  });
}

function stripTags(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  return tmp.textContent || tmp.innerText || '';
}

// ── PAGINATION ───────────────────────────────────────────────
function renderPagination(pgEl, state) {
  pgEl.innerHTML = '';

  const prevBtn = document.createElement('button');
  prevBtn.className = 'pg-btn';
  prevBtn.textContent = '←';
  prevBtn.disabled = state.currentPage <= 1;
  prevBtn.addEventListener('click', () => state.goTo(state.currentPage - 1));

  const indicator = document.createElement('span');
  indicator.className = 'pg-current';

  const curSpan = document.createElement('span');
  curSpan.textContent = state.currentPage;

  const sep = document.createElement('span');
  sep.className = 'pg-jump';
  sep.title = 'jump to page';
  sep.textContent = ' … ';

  const input = document.createElement('input');
  input.type = 'number';
  input.min = 1;
  input.className = 'pg-input';
  input.placeholder = '#';

  sep.addEventListener('click', () => {
    sep.style.display = 'none';
    input.classList.add('visible');
    input.value = '';
    input.focus();
  });

  const commit = () => {
    const v = parseInt(input.value);
    if (v >= 1 && v <= state.totalPages) state.goTo(v);
    input.classList.remove('visible');
    sep.style.display = '';
  };
  input.addEventListener('keydown', e => { if (e.key === 'Enter') commit(); if (e.key === 'Escape') { input.classList.remove('visible'); sep.style.display = ''; } });
  input.addEventListener('blur', commit);

  const totalSpan = document.createElement('span');
  totalSpan.textContent = state.totalPages ? ` / ${state.totalPages}` : '';

  indicator.appendChild(curSpan);
  indicator.appendChild(sep);
  indicator.appendChild(input);
  indicator.appendChild(totalSpan);

  const nextBtn = document.createElement('button');
  nextBtn.className = 'pg-btn';
  nextBtn.textContent = '→';
  nextBtn.disabled = state.isLastPage;
  nextBtn.addEventListener('click', () => state.goTo(state.currentPage + 1));

  pgEl.appendChild(prevBtn);
  pgEl.appendChild(indicator);
  pgEl.appendChild(nextBtn);
}

// ── FEED CONTROLLER ──────────────────────────────────────────
// Each pagination click fetches ?page=N from Tumblr directly.
// totalPages is discovered dynamically: when a fetch returns 0 items,
// the previous page was the last. We cache fetched pages to avoid
// redundant requests when navigating back.
function createFeedController({ feedUrl, masonryId, pgId, scrollId }) {
  const masonryEl = document.getElementById(masonryId);
  const pgEl      = document.getElementById(pgId);
  const scrollEl  = document.getElementById(scrollId);
 
  let currentPage = 1;
  let lastPage    = null;   // set once we hit an empty fetch
  let loading     = false;
  const cache     = {};     // page number → items array
 
  async function goTo(page) {
    if (loading) return;
    if (page < 1) return;
    if (lastPage !== null && page > lastPage) return;
 
    // If cached, render immediately
    if (cache[page]) {
      currentPage = page;
      renderCards(cache[page], masonryEl, openLightbox);
      scrollEl.scrollTop = 0;
      renderPagination(pgEl, {
        currentPage,
        totalPages: lastPage,
        isLastPage: lastPage !== null && currentPage >= lastPage,
        goTo,
      });
      return;
    }
 
    loading = true;
    masonryEl.innerHTML = '<div class="feed-state">loading…</div>';
 
    try {
      const pagedUrl = feedUrl + `?start=${(page - 1) * 20}`;
      const xml   = await fetchFeed(pagedUrl);
      const items = parseItems(xml);
 
      const isDuplicate = cache[1] && items.length > 0 &&
  items[0].link === cache[1][0].link;

if (items.length === 0 || (page > 1 && isDuplicate)) {
  lastPage = page - 1;
  currentPage = lastPage;
  loading = false;
  renderCards(cache[lastPage], masonryEl, openLightbox);
  renderPagination(pgEl, {
    currentPage: lastPage,
    totalPages: lastPage,
    isLastPage: true,
    goTo,
  });
  return;
}
 
      cache[page] = items;
      currentPage = page;
 
      renderCards(items, masonryEl, openLightbox);
      scrollEl.scrollTop = 0;
 
      // Peek at next page to see if we're at the end (fire and forget)
      peekNext(page + 1);
 
      renderPagination(pgEl, {
        currentPage,
        totalPages: lastPage,
        isLastPage: lastPage !== null && currentPage >= lastPage,
        goTo,
      });
    } catch(e) {
      masonryEl.innerHTML = `<div class="feed-state error">failed to load feed<br><small>${e.message}</small></div>`;
      console.error(e);
    }
 
    loading = false;
  }
 
  async function peekNext(page) {
  if (lastPage !== null || cache[page]) return;
  try {
    const pagedUrl = feedUrl + `?start=${(page - 1) * 20}`;
    const xml   = await fetchFeed(pagedUrl);
    const items = parseItems(xml);

    const isDuplicate = cache[1] && items.length > 0 &&
      items[0].link === cache[1][0].link;

    if (items.length === 0 || (page > 1 && isDuplicate)) {
      lastPage = page - 1;
    } else {
      cache[page] = items;
    }
    renderPagination(pgEl, {
      currentPage,
      totalPages: lastPage,
      isLastPage: lastPage !== null && currentPage >= lastPage,
      goTo,
    });
  } catch(_) { /* silent — peek is best-effort */ }
}
 
  goTo(1);
}

// ── LIGHTBOX ──────────────────────────────────────────────────
const lb      = document.getElementById('lightbox');
const lbContent = document.getElementById('lb-content');
const lbMeta    = document.getElementById('lb-meta');

let lbItems = [];
let lbIndex = 0;

function openLightbox(item, items, index) {
  lbItems = items || [];
  lbIndex = index ?? 0;
  renderLightbox(item);
  lb.classList.add('open');
}

function renderLightbox(item) {
  lbContent.innerHTML = '';

  const bodyText = stripTags(item.rawHtml).trim();
  const realTitle = item.title && !bodyText.startsWith(item.title.slice(0, 40))
    ? item.title : '';

  if (realTitle) {
    const t = document.createElement('div');
    t.className = 'lb-title';
    t.textContent = realTitle;
    lbContent.appendChild(t);
  }

  const body = document.createElement('div');
  body.className = 'lb-body';
  const tmp = document.createElement('div');
  tmp.innerHTML = item.rawHtml;
  tmp.querySelectorAll('img').forEach(i => {
    if (i.width === 1 || i.height === 1) i.remove();
    else { i.style.maxWidth = '100%'; i.style.height = 'auto'; }
  });
  body.innerHTML = tmp.innerHTML;
  lbContent.appendChild(body);

  lbMeta.textContent = item.date;
  document.getElementById('lb-inner').scrollTop = 0;

  document.getElementById('lb-prev').disabled = lbIndex <= 0;
  document.getElementById('lb-next').disabled = lbIndex >= lbItems.length - 1;
}

document.getElementById('lb-close').addEventListener('click', () => lb.classList.remove('open'));
lb.addEventListener('click', e => { if (e.target === lb) lb.classList.remove('open'); });
document.getElementById('lb-prev').addEventListener('click', () => {
  if (lbIndex > 0) { lbIndex--; renderLightbox(lbItems[lbIndex]); }
});
document.getElementById('lb-next').addEventListener('click', () => {
  if (lbIndex < lbItems.length - 1) { lbIndex++; renderLightbox(lbItems[lbIndex]); }
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') lb.classList.remove('open');
  if (!lb.classList.contains('open')) return;
  if (e.key === 'ArrowLeft' && lbIndex > 0) { lbIndex--; renderLightbox(lbItems[lbIndex]); }
  if (e.key === 'ArrowRight' && lbIndex < lbItems.length - 1) { lbIndex++; renderLightbox(lbItems[lbIndex]); }
});

// ── BOOT ─────────────────────────────────────────────────────
createFeedController({
  feedUrl:   CONFIG.leftFeed,
  masonryId: 'masonry-left',
  pgId:      'pg-left',
  scrollId:  'scroll-left',
});

createFeedController({
  feedUrl:   CONFIG.rightFeed,
  masonryId: 'masonry-right',
  pgId:      'pg-right',
  scrollId:  'scroll-right',
});
</script>
