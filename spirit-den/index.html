<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feed</title>
<link rel="icon" type="image/png" href="https://images.squarespace-cdn.com/content/v1/65c69f2e6eb8ad565f5d45f1/33d63755-2f5b-4f4a-9615-8608b9c3b6ea/Untitled+design.png?format=1500w/45x45">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap');

  :root {
    --bg: #0D0505;
    --fg: #C7BFBB;
    --fg-dim: #A09994;
    --border: #251919;
    --border-hover: #8f3838;
    --accent: #38418f;
    --surface: #120A0A;
    --topbar-h: 58px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--fg);
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 18px;
    -webkit-font-smoothing: antialiased;
  }

  body.preload { opacity: 0; }
  body.loaded {
    opacity: 1;
    transition: opacity 1s ease-out;
  }

  /* ── TOPBAR ── */

  #topbar {
    height: var(--topbar-h);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    position: relative;
    z-index: 10;
    flex-shrink: 0;
    padding-top: 0.75rem;
  }
  #logo {
    width: 40px; height: 40px;
    overflow: hidden;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: var(--fg-dim);
  }
  #logo img { width: 100%; height: 100%; object-fit: cover; }
  #site-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 400;
    letter-spacing: 0.02em;
    color: var(--fg);
  }

  /* ── TAB BUTTONS ── */
  #tab-bar {
    display: flex;
    align-items: center;
    gap: 2px;
    margin-left: 35px;
  }
  .tab-btn {
    background: none;
    border: 1px solid transparent;
    border-radius: 5px;
    color: var(--fg-dim);
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 4px 10px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
    line-height: 1;
  }
  .tab-btn:hover { color: var(--fg); }
  .tab-btn.active {
    color: var(--fg);
    border-color: var(--accent);
  }

  /* ── BODY ── */
  #body {
    display: flex;
    height: calc(100vh - var(--topbar-h));
    overflow: hidden;
  }

  .column {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
    padding: 0.5rem 3rem 0.5rem;
  }
  .column:last-child { border-right: none; }

  .col-scroll {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 20px 16px 12px;
    scrollbar-width: thin;
    scrollbar-color: var(--accent) transparent;
  }
  .col-scroll::-webkit-scrollbar { width: 4px; }
  .col-scroll::-webkit-scrollbar-track { background: transparent; }
  .col-scroll::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 2px; }

  /* ── MASONRY ── */
  .masonry {
    columns: 2;
    column-gap: 15px;
  }
  .post-card {
    break-inside: avoid;
    margin-bottom: 20px;
    border: 1px solid var(--bg);
    border-radius: 25px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s ease;
    background: var(--bg);
    padding: 20px 20px 10px;
  }
  .post-card:hover { 
    border: 1px solid;
    border-color: var(--border);
    background: var(--surface) }

  .post-card.type-text {
    padding: 35px 45px 10px;
  }
  .post-card.type-image .post-title,
  .post-card.type-image .post-body {
    padding-left: 25px;
    padding-right: 25px;
  }
  .post-card.type-image .post-title {
    padding-top: 10px;
  }
  .post-card.type-image .post-body {
    padding-top: 16px;
  }
  .post-card .post-title {
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    line-height: 1.4;
    color: var(--fg);
    margin-bottom: 8px;
  }
  .post-card .post-body {
    font-size: 15px;
    line-height: 1.6;
    color: var(--fg-dim);
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 18;
    -webkit-box-orient: vertical;
    overflow-wrap: break-word;
  }

  .post-card .post-body p {
    margin-bottom: 10px;
  }

  .post-card .post-body i,
  .post-card .post-body em {
    font-style: italic;
  }

  .post-date {
    display: block;
    text-align: right;
    font-size: 11px;
    font-family: 'Bricolage Grotesque', sans-serif;
    letter-spacing: 0.06em;
    color: var(--fg-dim);
    font-variant-numeric: tabular-nums;
    padding: 14px 10px 10px;
  }

  /* ── PAGINATION ── */
  .col-pagination {
    height: 36px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 0 14px;
    gap: 8px;
    flex-shrink: 0;
  }
  .pg-btn {
    background: none;
    border: none;
    color: var(--fg-dim);
    cursor: pointer;
    font-family: 'EB Garamond', serif;
    font-size: 15px;
    padding: 2px 4px;
    transition: color 0.15s;
    line-height: 1;
  }
  .pg-btn:hover { color: var(--fg); }
  .pg-btn:disabled { opacity: 0.25; cursor: default; }
  .pg-current {
    font-size: 11px;
    color: var(--fg-dim);
    letter-spacing: 0.04em;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .pg-jump {
    cursor: pointer;
    border-bottom: 1px dotted var(--fg-dim);
    padding: 0 1px;
    transition: color 0.15s, border-color 0.15s;
  }
  .pg-jump:hover { color: var(--fg); border-color: var(--fg); }
  .pg-input {
    background: #1a1a1a;
    border: 1px solid var(--border-hover);
    color: var(--fg);
    font-family: 'EB Garamond', serif;
    font-size: 11px;
    width: 36px;
    text-align: center;
    padding: 1px 3px;
    outline: none;
    display: none;
  }
  .pg-input.visible { display: inline-block; }

  .feed-state {
    padding: 40px 20px;
    text-align: center;
    color: var(--fg-dim);
    font-size: 11px;
    letter-spacing: 0.06em;
  }
  .feed-state.error { color: #c0392b; }

  /* ── LIGHTBOX ── */
  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(0,0,0,0.92);
    backdrop-filter: blur(6px);
    align-items: center;
    justify-content: center;
  }
  #lightbox.open { display: flex; }
  #lb-inner {
    position: relative;
    max-width: min(900px, 92vw);
    max-height: 95vh;
    overflow-y: auto;
    border: 1px solid var(--border);
    border-radius: 25px;
    background: var(--surface);
    scrollbar-width: thin;
    scrollbar-color: var(--border-hover) transparent;
  }
  #lb-inner::-webkit-scrollbar { width: 4px; }
  #lb-inner::-webkit-scrollbar-thumb { background: var(--border-hover); }
  #lb-close {
    position: fixed;
    top: 18px; right: 22px;
    background: none;
    border: none;
    color: var(--fg-dim);
    font-size: 22px;
    cursor: pointer;
    line-height: 1;
    z-index: 101;
    transition: color 0.15s;
  }
  #lb-close:hover { color: var(--fg); }
  #lb-content {
    padding: 2.5rem 2.5rem 0.5rem;
  }
  #lb-content img {
    display: block;
    width: 100%;
    height: auto;
    margin-bottom: 16px;
  }
  #lb-content .lb-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    line-height: 1.3;
    margin-bottom: 14px;
    color: var(--fg);
  }
  #lb-content .lb-body {
    font-size: 17px;
    line-height: 1.75;
    color: var(--fg-dim);
    overflow-wrap: break-word;
  }

  #lb-content .lb-body p { margin-bottom: 10px; }
  #lb-content .lb-body img { max-width: 100%; height: auto; }
  #lb-content .lb-body a { color: var(--fg); }
  #lb-meta {
    font-size: 13px;
    padding: 14px 14px 14px;
    letter-spacing: 0.06em;
    color: var(--fg-dim);
    text-align: right;
  }

  #lb-prev, #lb-next {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--fg-dim);
    font-size: 28px;
    cursor: pointer;
    z-index: 101;
    padding: 16px;
    transition: color 0.15s;
    line-height: 1;
  }
  #lb-prev:hover, #lb-next:hover { color: var(--fg); }
  #lb-prev:disabled, #lb-next:disabled { opacity: 0.15; cursor: default; }
  #lb-prev { left: 12px; }
  #lb-next { right: 12px; }

  /* ── POST IMAGE LAYOUT ── */
  .post-images {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
    overflow: hidden;
  }
  .post-img-row {
    display: flex;
    gap: 12px;
    width: 100%;
  }
  .post-img-row img {
    flex: 1;
    width: 0;
    height: auto;
    display: block;
    object-fit: cover;
    min-width: 0;
  }
  .post-img-row:not(.multi) img {
    width: 100%;
    flex: unset;
    height: auto;
  }
  .post-img-row.multi img {
    height: 160px;
    object-fit: cover;
  }


  @media (max-width: 700px) {
    html, body { overflow: auto; height: auto; }
    #body { flex-direction: column; height: auto; overflow: visible; }
    .column {
      border-right: none;
      border-bottom: 1px solid var(--border);
      height: auto;
      overflow: visible;
      padding: 0.25rem;
    }
    .col-scroll {
      overflow: visible;
      height: auto;
      padding: 28px 12px 8px;
    }
    .masonry {
      columns: 1;
      column-gap: 0;
    }
    .col-pagination { justify-content: flex-end; }
    #topbar { gap: 10px; }

    .post-card {
      padding: 20px 20px 2px;
    }

    .post-card.type-text {
      padding: 20px 20px 2px;
    }

    .post-card .post-body { font-size: 14px;
    }


    .post-card.type-image .post-title,
     .post-card.type-image .post-body {
    padding-left: 0px;
    padding-right: 0px;
    }
   

    #lb-content { 
      padding: 1.25rem 1.25rem 0.5rem;
     }

    #lb-meta {
      padding: 0.3rem 0.8rem 0.8rem;
    }

    #lb-nav {
      display: flex;
      justify-content: space-between;
      width: 92vw;
      padding: 4px 0;
    }

    #lb-content .lb-body { font-size: 14px; }

    #lb-prev, #lb-next {
      position: static;
      transform: none;
      top: auto; left: auto; right: auto;
      font-size: 22px;
      padding: 25px 16px;
    }
    #lightbox {
      flex-direction: column;
      align-items: center;
    }
    #lb-inner {
      max-height: 70vh;
      width: 92vw;
      margin-top: 40px;
    }
  }

</style>
</head>

    leftTag:   'text',

  };

<script>

window.addEventListener('load', () => {
  document.body.classList.remove('preload');
  document.body.classList.add('loaded');
});

// ── TOPBAR ───────────────────────────────────────────────────
(function() {
  const logoEl = document.getElementById('logo');
  if (CONFIG.logoSrc) {
    logoEl.innerHTML = `<img src="${CONFIG.logoSrc}" alt="logo">`;
  } else {
    logoEl.textContent = CONFIG.logoText;
  }
  document.getElementById('site-title').textContent = CONFIG.siteTitle;
  document.title = CONFIG.siteTitle;
})();

// ── TUMBLR API v2 FETCH ───────────────────────────────────────
async function fetchPosts(tag, offset) {
  const url = `https://api.tumblr.com/v2/blog/${CONFIG.blogName}.tumblr.com/posts`
    + `?tag=${encodeURIComponent(tag)}`
    + `&limit=${CONFIG.limit}`
    + `&offset=${offset}`
    + `&npf=false`
    + `&api_key=${CONFIG.apiKey}`;

  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const json = await res.json();
  if (json.meta && json.meta.status >= 400) throw new Error(json.meta.msg || 'API error');
  return json.response; // { posts: [...], total_posts: N }
}

// ── NORMALISE API POST → item shape ──────────────────────────
function normalisePost(post) {
  const date = post.date ? formatDate(new Date(post.date)) : '';

  // Build rawHtml and imgs depending on post type
  let rawHtml = '';
  let imgs = [];
  let layout = '';
  let title = post.summary || '';

  switch (post.type) {
    case 'photo': {
      // caption is the text body; photos array has image urls
      rawHtml = post.caption || '';
      imgs = (post.photos || []).map(p => ({ src: p.original_size.url }));
      title = '';
      // photoset_layout is a string like "12" meaning row of 1, row of 2
      if (post.photoset_layout) layout = post.photoset_layout;
      break;
    }
    case 'text': {
      rawHtml = post.body || '';
      title   = post.title || '';
      break;
    }
    case 'quote': {
      rawHtml = `<p>${post.text || ''}</p><p><em>— ${post.source || ''}</em></p>`;
      title   = '';
      break;
    }
    case 'link': {
      rawHtml = `<p><a href="${post.url}">${post.title || post.url}</a></p>${post.description || ''}`;
      title   = post.title || '';
      break;
    }
    case 'chat': {
      rawHtml = (post.dialogue || []).map(d => `<p><strong>${d.label}</strong> ${d.phrase}</p>`).join('');
      title   = post.title || '';
      break;
    }
    case 'audio': {
      rawHtml = post.caption || '';
      title   = post.track_name || post.artist || '';
      break;
    }
    case 'video': {
      rawHtml = post.caption || '';
      // embed the player HTML if available
      const player = post.player && post.player.length
        ? post.player[post.player.length - 1].embed_code || ''
        : '';
      if (player) rawHtml = player + rawHtml;
      break;
    }
    default: {
      rawHtml = post.caption || post.body || '';
      break;
    }
  }

  // Fallback: extract imgs from body HTML.
  // Tumblr returns NPF posts as type:"text" with images embedded in body.
  if (imgs.length === 0 && rawHtml) {
    const tmp = document.createElement('div');
    tmp.innerHTML = rawHtml;
    imgs = Array.from(tmp.querySelectorAll('img'))
      .filter(i => i.src && !i.src.includes('avatar'))
      .map(i => ({ src: i.src, srcset: i.getAttribute('srcset') || '' }));
  }

  return { title, date, rawHtml, imgs, layout, link: post.post_url || '' };
}

function formatDate(d) {
  if (isNaN(d)) return '';
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const yy = String(d.getFullYear()).slice(2);
  return `${dd}/${mm}/${yy}`;
}

// ── RENDER ───────────────────────────────────────────────────
function renderCards(items, masonryEl, onCardClick) {
  masonryEl.innerHTML = '';
  if (!items.length) {
    masonryEl.innerHTML = '<div class="feed-state">no posts</div>';
    return;
  }
  items.forEach((item, idx) => {
    const card = document.createElement('div');
    const hasImages = item.imgs.length > 0;

    const bodyText = stripTags(item.rawHtml).trim();
    const realTitle = item.title && !bodyText.startsWith(item.title.slice(0, 40))
      ? item.title : '';

    card.className = hasImages ? 'post-card type-image' : 'post-card type-text';

    if (hasImages) {
      const imgContainer = document.createElement('div');
      imgContainer.className = 'post-images';

      // Build rows from photoset_layout if present (e.g. "12" = [1,2])
      // Each digit = number of images in that row.
      const layoutStr = item.layout || '';
      let rows = [];
      if (layoutStr) {
        let idx = 0;
        for (const ch of layoutStr) {
          const count = parseInt(ch);
          if (!isNaN(count) && count > 0) {
            rows.push(item.imgs.slice(idx, idx + count));
            idx += count;
          }
        }
        // Any remaining images not covered by layout go in a final row
        if (idx < item.imgs.length) rows.push(item.imgs.slice(idx));
      } else {
        // No layout info — stack all images vertically
        rows = item.imgs.map(img => [img]);
      }

      rows.forEach(rowImgs => {
        const row = document.createElement('div');
        row.className = rowImgs.length > 1 ? 'post-img-row multi' : 'post-img-row';
        rowImgs.forEach(imgData => {
          const img = document.createElement('img');
          if (imgData.srcset) {
            const entries = imgData.srcset.split(',').map(s => s.trim().split(/\s+/));
            const best = entries.reduce((a, b) => (parseInt(b[1]) > parseInt(a[1]) ? b : a), entries[0]);
            img.src = (best && best[0]) ? best[0] : imgData.src;
          } else {
            img.src = imgData.src;
          }
          img.alt = '';
          img.loading = 'lazy';
          row.appendChild(img);
        });
        imgContainer.appendChild(row);
      });

      card.appendChild(imgContainer);
    }

    if (realTitle) {
      const t = document.createElement('div');
      t.className = 'post-title';
      t.textContent = realTitle;
      card.appendChild(t);
    }

    if (!hasImages || bodyText.length > 10) {
      const body = document.createElement('div');
      body.className = 'post-body';
      const tmp = document.createElement('div');
      tmp.innerHTML = item.rawHtml;
      tmp.querySelectorAll('img, figure, iframe, video, a').forEach(el => el.remove());
      body.innerHTML = tmp.innerHTML;
      card.appendChild(body);
    }

    if (item.date) {
      const meta = document.createElement('div');
      meta.className = 'post-date';
      meta.textContent = item.date;
      card.appendChild(meta);
    }

    card.addEventListener('click', () => onCardClick(item, items, idx));
    masonryEl.appendChild(card);
  });
}

function stripTags(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  return tmp.textContent || tmp.innerText || '';
}

// ── PAGINATION ───────────────────────────────────────────────
function renderPagination(pgEl, state) {
  pgEl.innerHTML = '';

  const prevBtn = document.createElement('button');
  prevBtn.className = 'pg-btn';
  prevBtn.textContent = '←';
  prevBtn.disabled = state.currentPage <= 1;
  prevBtn.addEventListener('click', () => state.goTo(state.currentPage - 1));

  const indicator = document.createElement('span');
  indicator.className = 'pg-current';

  const curSpan = document.createElement('span');
  curSpan.textContent = state.currentPage;

  const sep = document.createElement('span');
  sep.className = 'pg-jump';
  sep.title = 'jump to page';
  sep.textContent = ' … ';

  const input = document.createElement('input');
  input.type = 'number';
  input.min = 1;
  input.className = 'pg-input';
  input.placeholder = '#';

  sep.addEventListener('click', () => {
    sep.style.display = 'none';
    input.classList.add('visible');
    input.value = '';
    input.focus();
  });

  const commit = () => {
    const v = parseInt(input.value);
    if (v >= 1 && v <= state.totalPages) state.goTo(v);
    input.classList.remove('visible');
    sep.style.display = '';
  };
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') commit();
    if (e.key === 'Escape') { input.classList.remove('visible'); sep.style.display = ''; }
  });
  input.addEventListener('blur', commit);

  const totalSpan = document.createElement('span');
  totalSpan.textContent = state.totalPages ? ` / ${state.totalPages}` : '';

  indicator.appendChild(curSpan);
  indicator.appendChild(sep);
  indicator.appendChild(input);
  indicator.appendChild(totalSpan);

  const nextBtn = document.createElement('button');
  nextBtn.className = 'pg-btn';
  nextBtn.textContent = '→';
  nextBtn.disabled = state.currentPage >= state.totalPages;
  nextBtn.addEventListener('click', () => state.goTo(state.currentPage + 1));

  pgEl.appendChild(prevBtn);
  pgEl.appendChild(indicator);
  pgEl.appendChild(nextBtn);
}

// ── FEED CONTROLLER ──────────────────────────────────────────
function createFeedController({ tag, masonryId, pgId, scrollId }) {
  const masonryEl = document.getElementById(masonryId);
  const pgEl      = document.getElementById(pgId);
  const scrollEl  = document.getElementById(scrollId);

  let currentPage = 1;
  let totalPages  = null;
  let loading     = false;
  const cache     = {};

  async function goTo(page) {
    if (loading) return;
    if (page < 1) return;
    if (totalPages !== null && page > totalPages) return;

    if (cache[page]) {
      currentPage = page;
      renderCards(cache[page], masonryEl, openLightbox);
      scrollEl.scrollTop = 0;
      renderPagination(pgEl, { currentPage, totalPages, goTo });
      return;
    }

    loading = true;
    masonryEl.innerHTML = '<div class="feed-state">loading…</div>';

    try {
      const offset   = (page - 1) * CONFIG.limit;
      const response = await fetchPosts(tag, offset);
      const items    = (response.posts || []).map(normalisePost);

      // Detect last page by result count, not total_posts
      // (total_posts reflects whole-blog count, not per-tag count)
      if (items.length < CONFIG.limit) totalPages = page;
      cache[page] = items;
      currentPage = page;

      renderCards(items, masonryEl, openLightbox);
      scrollEl.scrollTop = 0;
      renderPagination(pgEl, { currentPage, totalPages, goTo });
    } catch(e) {
      masonryEl.innerHTML = `<div class="feed-state error">failed to load<br><small>${e.message}</small></div>`;
      console.error(e);
    }

    loading = false;
  }

  goTo(1);
}

// ── LIGHTBOX ─────────────────────────────────────────────────
const lb        = document.getElementById('lightbox');
const lbContent = document.getElementById('lb-content');
const lbMeta    = document.getElementById('lb-meta');

let lbItems = [];
let lbIndex = 0;

function openLightbox(item, items, index) {
  lbItems = items || [];
  lbIndex = index ?? 0;
  renderLightbox(item);
  lb.classList.add('open');
}

function renderLightbox(item) {
  lbContent.innerHTML = '';

  const bodyText = stripTags(item.rawHtml).trim();
  const realTitle = item.title && !bodyText.startsWith(item.title.slice(0, 40))
    ? item.title : '';

  if (realTitle) {
    const t = document.createElement('div');
    t.className = 'lb-title';
    t.textContent = realTitle;
    lbContent.appendChild(t);
  }

  const body = document.createElement('div');
  body.className = 'lb-body';
  const tmp = document.createElement('div');
  tmp.innerHTML = item.rawHtml;
  tmp.querySelectorAll('img').forEach(i => {
    if (i.width === 1 || i.height === 1) { i.remove(); return; }
    // Upgrade to highest-res srcset entry if available
    const srcset = i.getAttribute('srcset');
    if (srcset) {
      const entries = srcset.split(',').map(s => s.trim().split(/\s+/));
      const best = entries.reduce((a, b) => (parseInt(b[1]) > parseInt(a[1]) ? b : a), entries[0]);
      if (best && best[0]) i.src = best[0];
      i.removeAttribute('srcset');
      i.removeAttribute('sizes');
    }
    i.style.cssText = 'width:100%;height:auto;display:block;margin-bottom:12px;';
  });
  body.innerHTML = tmp.innerHTML;
  lbContent.appendChild(body);

  lbMeta.textContent = item.date;
  document.getElementById('lb-inner').scrollTop = 0;

  document.getElementById('lb-prev').disabled = lbIndex <= 0;
  document.getElementById('lb-next').disabled = lbIndex >= lbItems.length - 1;
}

document.getElementById('lb-close').addEventListener('click', () => lb.classList.remove('open'));
lb.addEventListener('click', e => { if (e.target === lb) lb.classList.remove('open'); });
document.getElementById('lb-prev').addEventListener('click', () => {
  if (lbIndex > 0) { lbIndex--; renderLightbox(lbItems[lbIndex]); }
});
document.getElementById('lb-next').addEventListener('click', () => {
  if (lbIndex < lbItems.length - 1) { lbIndex++; renderLightbox(lbItems[lbIndex]); }
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') lb.classList.remove('open');
  if (!lb.classList.contains('open')) return;
  if (e.key === 'ArrowLeft' && lbIndex > 0) { lbIndex--; renderLightbox(lbItems[lbIndex]); }
  if (e.key === 'ArrowRight' && lbIndex < lbItems.length - 1) { lbIndex++; renderLightbox(lbItems[lbIndex]); }
});

// ── BOOT ─────────────────────────────────────────────────────
createFeedController({ tag: CONFIG.leftTag,  masonryId: 'masonry-text',  pgId: 'pg-text',  scrollId: 'scroll-text'  });
createFeedController({ tag: CONFIG.rightTag, masonryId: 'masonry-image', pgId: 'pg-image', scrollId: 'scroll-image' });
createFeedController({ tag: CONFIG.thirdTag, masonryId: 'masonry-log', pgId: 'pg-log', scrollId: 'scroll-log' });

// ── TAB SWITCHING ─────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const tab = btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('col-text').style.display  = tab === 'text'  ? '' : 'none';
    document.getElementById('col-image').style.display = tab === 'image' ? '' : 'none';
    document.getElementById('col-log').style.display = tab === 'log' ? '' : 'none';
  });
});

</script>
